name: CI/CD Pipeline

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PRODUCTION_DOMAIN: "code-iplier.github.io"
  PRODUCTION_PATH: "/ouroboros-custom-test"

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Stage 1: Lint & Unit tests
  # ---------------------------------------------------------------------------
  lint-quality:
    name: Lint & Formatting
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies (npm ci)
        run: npm ci

      - name: Check formatting (Prettier)
        run: npm run format:check

      - name: Lint (ESLint)
        run: npm run lint

      - name: Install ESLint SARIF formatter (no-save)
        run: npm install --no-save @microsoft/eslint-formatter-sarif

      - name: Generate ESLint SARIF
        run: npx eslint . -f @microsoft/eslint-formatter-sarif -o eslint.sarif || true

      - name: Upload ESLint SARIF artifact
        if: always() && hashFiles('eslint.sarif') != ''
        uses: actions/upload-artifact@v7
        with:
          name: eslint-sarif
          path: eslint.sarif

      - name: Upload ESLint SARIF to Code Scanning
        if: vars.ENABLE_CODE_SCANNING_SARIF == 'true' && always() && hashFiles('eslint.sarif') != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: eslint.sarif

  # ---------------------------------------------------------------------------
  # Stage 2: Build Dist & Scan
  # ---------------------------------------------------------------------------
  build-dist:
    name: Build Artifact for Deployment
    runs-on: ubuntu-latest
    needs: [lint-quality]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies (npm ci)
        run: npm ci

      - name: Build app
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL || vars.VITE_API_BASE_URL || format('https://api.{0}', env.PRODUCTION_DOMAIN) }}
          VITE_API_VERSION: ${{ secrets.VITE_API_VERSION || vars.VITE_API_VERSION || 'v1' }}
          VITE_USE_MOCK_API: "true"

      - name: Inject app-version meta tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${{ github.ref_name }}"
          sed -i "s|</head>|<meta name=\"app-version\" content=\"${VERSION}\"></head>|" dist/index.html

      - name: Verify build output
        run: |
          echo "✅ Build output ready for ${{ env.PRODUCTION_DOMAIN }}${{ env.PRODUCTION_PATH }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: build
          path: dist

  security-scan:
    name: Security Scan (Snyk OSS)
    runs-on: ubuntu-latest
    needs: [lint-quality]
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Snyk CLI
        if: env.SNYK_TOKEN != ''
        uses: snyk/actions/setup@v1.0.0

      - name: Snyk Open Source scan
        if: env.SNYK_TOKEN != ''
        run: |
          snyk auth "$SNYK_TOKEN"
          snyk test --severity-threshold=high --sarif-file-output=snyk.sarif

      - name: Upload Snyk SARIF to Code Scanning
        if: vars.ENABLE_CODE_SCANNING_SARIF == 'true' && env.SNYK_TOKEN != '' && always() && hashFiles('snyk.sarif') != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk.sarif

      - name: Upload Snyk SARIF artifact
        if: env.SNYK_TOKEN != '' && always() && hashFiles('snyk.sarif') != ''
        uses: actions/upload-artifact@v7
        with:
          name: snyk-sarif
          path: snyk.sarif

  # ---------------------------------------------------------------------------
  # Stage 3: Docker Build
  # ---------------------------------------------------------------------------
  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [build-dist, security-scan]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha
            type=raw,value=${{ github.sha }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Stage 4: Trivy Scan
  # ---------------------------------------------------------------------------
  trivy-scan:
    name: Trivy Scan
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [docker-build]
    permissions:
      contents: read
      packages: read
      security-events: write
      actions: read
    steps:
      - name: Set lowercase image name
        run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy scanner (SARIF)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.IMAGE }}:${{ github.sha }}
          format: "sarif"
          output: "trivy.sarif"

      - name: Upload Trivy SARIF to Code Scanning
        if: vars.ENABLE_CODE_SCANNING_SARIF == 'true' && always() && hashFiles('trivy.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy.sarif

      - name: Run Trivy scanner (JSON)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.IMAGE }}:${{ github.sha }}
          format: "json"
          output: "trivy-results.json"

      - name: Upload Trivy report
        if: always() && hashFiles('trivy-results.json') != ''
        uses: actions/upload-artifact@v7
        with:
          name: trivy-report
          path: trivy-results.json

  # ---------------------------------------------------------------------------
  # Stage 5: Deploy to GitHub Pages
  # ---------------------------------------------------------------------------
  deploy-pages:
    name: Deploy to Production Website
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [build-dist, security-scan]
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v7
        with:
          name: build
          path: dist

      - name: Verify dist exists
        run: |
          if [ ! -f dist/index.html ]; then
            echo "❌ dist/index.html not found!"
            exit 1
          fi
          echo "✅ dist verified"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Health check website assets
        run: |
          URL="https://${{ env.PRODUCTION_DOMAIN }}${{ env.PRODUCTION_PATH }}/"
          ORIGIN="https://${{ env.PRODUCTION_DOMAIN }}"
          echo "Checking $URL ..."
          for i in {1..24}; do
            if ! curl -fsS -o index_out.html "$URL"; then
              echo "Attempt $i: index fetch failed"; sleep 10; continue
            fi
            MAIN_JS=$(grep -Eo 'src="[^"]*\.js"' index_out.html | head -n1 | sed -E 's/src="([^"]+)"/\1/') || true
            MAIN_CSS=$(grep -Eo 'href="[^"]*\.css"' index_out.html | head -n1 | sed -E 's/href="([^"]+)"/\1/') || true
            make_abs() {
              local p="$1"
              if [[ -z "$p" ]]; then echo ""
              elif [[ "$p" =~ ^https?:// ]]; then echo "$p"
              elif [[ "$p" =~ ^/ ]]; then echo "${ORIGIN}$p"
              else echo "${URL%/}/$p"
              fi
            }
            JS_URL=$(make_abs "${MAIN_JS:-}")
            CSS_URL=$(make_abs "${MAIN_CSS:-}")
            JS_OK=false; CSS_OK=false
            if [ -n "${JS_URL}" ]; then curl -fsSLI "$JS_URL" | grep -q "^HTTP/.* 200" && JS_OK=true || JS_OK=false; fi
            if [ -n "${CSS_URL}" ]; then curl -fsSLI "$CSS_URL" | grep -q "^HTTP/.* 200" && CSS_OK=true || CSS_OK=false; fi
            if $JS_OK && $CSS_OK; then
              echo "✓ Health check passed on attempt $i"
              rm -f index_out.html
              exit 0
            fi
            echo "Attempt $i: retrying assets loading..."; sleep 10
          done
          echo "✗ Health check failed after retries"
          exit 1

      - name: Install Playwright and Chromium
        run: |
          npm install --no-save playwright@1.60.0
          npx --yes playwright install --with-deps chromium

      - name: Run Playwright smoke test
        run: |
          export URL="https://${{ env.PRODUCTION_DOMAIN }}${{ env.PRODUCTION_PATH }}/"
          cat > smoke.cjs << 'JS'
          const { chromium } = require('playwright');
          const BENIGN_PATTERNS = [
            /Failed to start Mock Service Worker/i,
            /\[MSW\]/i,
            /service.worker/i,
            /favicon\.svg/i,
            /manifest\.webmanifest/i,
            /robots\.txt/i,
            /favicon\.ico/i,
          ];
          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage();
            const consoleErrors = [];
            page.on('console', msg => {
              if (msg.type() === 'error') {
                const text = msg.text();
                if (BENIGN_PATTERNS.some(p => p.test(text))) return;
                consoleErrors.push(text);
              }
            });
            const targetUrl = process.env.URL;
            await page.goto(targetUrl, { waitUntil: 'domcontentloaded', timeout: 60000 });
            try {
              await page.waitForFunction(() => {
                const root = document.getElementById('root');
                return !!root && root.textContent && root.textContent.trim().length > 0;
              }, { timeout: 15000 });
            } catch (e) {
              await browser.close();
              console.error('Smoke: Root failed to render');
              process.exit(1);
            }
            if (consoleErrors.length > 0) {
              await browser.close();
              console.error('Smoke: console errors:\n' + consoleErrors.join('\n'));
              process.exit(1);
            }
            await browser.close();
            console.log('Smoke: successfully loaded client UI');
          })();
          JS
          node smoke.cjs

  # ---------------------------------------------------------------------------
  # Stage 6: Meta Version Verification
  # ---------------------------------------------------------------------------
  verify-deployed-tag:
    name: Verify Deployed Tag
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [deploy-pages]
    steps:
      - name: Fetch website and check app-version
        run: |
          URL="https://${{ env.PRODUCTION_DOMAIN }}${{ env.PRODUCTION_PATH }}/"
          EXPECTED="${{ github.ref_name }}"
          sleep 15
          DEPLOYED=""
          for i in {1..3}; do
            HTML="$(curl --retry 3 --retry-delay 5 -fsSL "$URL" || true)"
            if [ -n "$HTML" ]; then
              DEPLOYED="$(echo "$HTML" | grep 'name="app-version"' | sed -n 's/.*content="\([^"]*\)".*/\1/p' | head -1 | tr -d "\r\n")"
            fi
            if [ -n "$DEPLOYED" ]; then break; fi
            sleep 5
          done
          if [ -z "$DEPLOYED" ]; then
            echo "❌ Metatag app-version missing on $URL"
            exit 1
          fi
          if [ "$DEPLOYED" != "$EXPECTED" ]; then
            echo "❌ Version mismatch: deployed=$DEPLOYED expected=$EXPECTED"
            exit 1
          fi
          echo "✅ Successfully deployed tag version: $EXPECTED"

  # ---------------------------------------------------------------------------
  # Stage 7: OWASP ZAP security scan
  # ---------------------------------------------------------------------------
  zap-production-dast:
    name: OWASP ZAP Production Scan
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [deploy-pages]
    steps:
      - name: OWASP ZAP Baseline
        run: |
          docker run --rm -v $(pwd):/zap/wrk -t ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py -t "https://${{ env.PRODUCTION_DOMAIN }}${{ env.PRODUCTION_PATH }}/" \
            -J zap-production.json -w zap-production.md -r zap-production.html -a \
            > zap-baseline.log 2>&1 || true

      - name: Ensure ZAP reports exist
        if: always()
        run: |
          for file in zap-production.html zap-production.json zap-production.md; do
            if [ ! -f "$file" ] || [ ! -s "$file" ]; then
              case "$file" in
                *.html) echo "<html><body>ZAP placeholder</body></html>" > "$file" ;;
                *.json) echo '{"message":"placeholder"}' > "$file" ;;
                *.md) echo "# ZAP Placeholder" > "$file" ;;
              esac
            fi
          done

      - name: Upload ZAP reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: zap-production
          path: |
            zap-production.html
            zap-production.json
            zap-production.md

  # ---------------------------------------------------------------------------
  # Stage 8: Reports summary
  # ---------------------------------------------------------------------------
  reports-summary:
    name: CI Summary & Report Bundle
    runs-on: ubuntu-latest
    needs:
      [
        lint-quality,
        build-dist,
        security-scan,
        trivy-scan,
        deploy-pages,
        verify-deployed-tag,
        zap-production-dast,
      ]
    if: always()
    steps:
      - name: Create CI summary
        run: |
          {
            echo "# CI Reports";
            echo "- Commit: $GITHUB_SHA";
            echo "- Domain: https://${{ env.PRODUCTION_DOMAIN }}${{ env.PRODUCTION_PATH }}";
            echo "";
            echo "## Job Results";
            echo "- Lint & Formatting: ${{ needs.lint-quality.result }}";
            echo "- Build Artifact: ${{ needs.build-dist.result }}";
            echo "- Security Scan: ${{ needs.security-scan.result }}";
            echo "- Trivy Scan: ${{ needs.trivy-scan.result }}";
            echo "- Deploy: ${{ needs.deploy-pages.result }}";
            echo "- Verify Deployed Tag: ${{ needs.verify-deployed-tag.result }}";
            echo "- ZAP Production Scan: ${{ needs.zap-production-dast.result }}";
          } > summary.md

      - name: Upload consolidated report bundle
        uses: actions/upload-artifact@v7
        with:
          name: ci-reports
          path: summary.md
